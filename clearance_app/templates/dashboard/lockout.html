<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Locked | Security Lockout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f4f6f9;
            /* SULUHISHO LA UREFU: min-height inazuia kadi kukatwa kwa chini kwenye simu fupi */
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px; /* Inazuia kadi kugusa kingo za skrini ya simu */
        }
        .lockout-card {
            width: 100%;
            max-width: 480px; /* Inakaa saizi nzuri kwenye PC na kusinyaa vizuri kwenye simu */
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08) !important;
        }
    </style>
</head>
<body>

    <div class="card lockout-card shadow p-3 text-center border-0">
        <div class="card-body">
            <div class="text-danger mb-3">
                <i class="bi bi-shield-slash-fill" style="font-size: 4rem;"></i>
            </div>
            <h3 class="card-title text-dark fw-bold mb-3">Access Denied!</h3>
            <p class="text-muted fs-6">
                You have entered an incorrect password three times consecutively. For the security of your account, the system has suspended your access for <strong>48 hours</strong>.
            </p>
            
            <div class="alert alert-warning border-0 small my-3 text-start" role="alert">
                <i class="bi bi-info-circle-fill me-2"></i> Please try again after the lockout period expires or contact the System Administrator (Admin) for assistance.
            </div>
            
            <form action="{% url 'logout' %}" method="post" class="mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-danger w-100 py-2 fw-semibold" style="border-radius: 8px;">
                    <i class="bi bi-box-arrow-left me-2"></i> Log Out & Return to Login
                </button>
            </form>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
