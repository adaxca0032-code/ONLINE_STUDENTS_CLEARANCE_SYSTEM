<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Locked | Security Lockout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow p-4 text-center border-0" style="max-width: 500px; border-radius: 15px;">
        <div class="card-body">
            <div class="text-danger mb-3">
                <i class="bi bi-shield-slash-fill" style="font-size: 4rem;"></i>
            </div>
            <h3 class="card-title text-dark fw-bold mb-3">Access Denied!</h3>
            <p class="text-muted fs-6">
                You have entered an incorrect password three times consecutively. For the security of your account, the system has suspended your access for <strong>48 hours</strong>.
            </p>
            <div class="alert alert-warning border-0 small my-3" role="alert">
                <i class="bi bi-info-circle-fill me-2"></i> Please try again after the lockout period expires or contact the System Administrator (Admin) for assistance.
            </div>
            <a href="/login/" class="btn btn-outline-secondary w-100 mt-2" style="border-radius: 8px;">Return to Login</a>
        </div>
    </div>
</body>
</html>
