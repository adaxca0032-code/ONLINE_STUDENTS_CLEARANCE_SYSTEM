<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Student Clearance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Student Clearance System</h3>
                    <p class="text-muted">Sign in to start your session</p>
                </div>

                {% if form.errors %}
                    <div class="alert alert-danger text-center" role="alert">
                        Invalid username or password! Please try again.
                    </div>
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">Username / Reg Number</label>
                        <input type="text" name="username" id="id_username" class="form-control p-2.5" placeholder="Enter your username" required>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" id="id_password" class="form-control p-2.5" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 p-2.5 fw-bold text-uppercase">Sign In</button>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">&copy; 2026 Online Student Clearance System</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
